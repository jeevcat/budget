comments:
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  CognitiveComplexMethod:
    # Compose declarative UI functions are inherently nested
    allowedComplexity: 45
  LongMethod:
    # Compose functions are naturally longer than imperative code
    allowedLines: 120
  LongParameterList:
    allowedFunctionParameters: 10
    ignoreDefaultParameters: true
  StringLiteralDuplication:
    active: false
  TooManyFunctions:
    allowedFunctionsPerFile: 25
    allowedFunctionsPerClass: 15

naming:
  FunctionNaming:
    # Compose @Composable functions use PascalCase
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

potential-bugs:
  LateinitUsage:
    active: false

style:
  BracesOnIfStatements:
    active: false
  BracesOnWhenStatements:
    active: false
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreLocalVariableDeclaration: true
    ignoreEnums: true
  ReturnCount:
    max: 5
    excludeGuardClauses: true
  UseIfInsteadOfWhen:
    active: false
  UseLet:
    active: false
