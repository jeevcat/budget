name: iOS

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Get version
        id: version
        run: echo "version=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build archive
        working-directory: ios
        run: |
          xcodebuild \
            -project Budget.xcodeproj \
            -scheme Budget \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath Budget.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create export options
        working-directory: ios
        run: |
          cat > ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        working-directory: ios
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath Budget.xcarchive \
            -exportPath export \
            -exportOptionsPlist ExportOptions.plist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v${{ steps.version.outputs.version }}
          name: iOS ${{ steps.version.outputs.version }}
          files: ios/export/Budget.ipa
          prerelease: true
          generate_release_notes: true
