name: Sync bun.nix

on:
  push:
    branches: ["renovate/**"]
    paths: [bun.lock]

permissions:
  contents: write

jobs:
  sync:
    name: Regenerate bun.nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Commit bun.nix if changed
        run: |
          if ! git diff --quiet bun.nix; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add bun.nix
            git commit -m "Regenerate bun.nix"
            git push
          fi
