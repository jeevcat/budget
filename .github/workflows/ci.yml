name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: budget
          POSTGRES_PASSWORD: budget
          POSTGRES_DB: budget
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://budget:budget@localhost:5432/budget
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Migrations
        run: |
          cargo fetch --quiet
          for f in migrations/*.sql; do psql "$DATABASE_URL" -f "$f"; done
          APALIS_DIR=$(find ~/.cargo/registry/src -maxdepth 2 -name 'apalis-postgres-*' -type d -print -quit 2>/dev/null)
          if [ -n "$APALIS_DIR" ]; then for f in "$APALIS_DIR"/migrations/*.sql; do psql "$DATABASE_URL" -f "$f"; done; fi
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --all-features

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: biomejs/setup-biome@v2
      - name: Biome
        run: biome check frontend/

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Formatting (Spotless)
        run: ./gradlew spotlessCheck --console=plain --no-problems-report
      - name: Static analysis (detekt)
        run: ./gradlew detekt --console=plain --no-problems-report
      - name: Android Lint
        run: ./gradlew :androidApp:lint --console=plain --no-problems-report
      - name: Tests
        run: ./gradlew allTests --console=plain --no-problems-report
      - name: Compile
        run: ./gradlew compileDebugKotlin --warning-mode all --console=plain --no-problems-report

  nix:
    name: Nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Flake check
        run: nix flake check
