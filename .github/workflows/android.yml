name: Android

on:
  push:
    branches: [main]

# Only one build at a time — cancel in-flight builds when a new push arrives
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      - name: Get version
        id: version
        run: echo "version=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: >
          ./gradlew :androidApp:assembleRelease
          -Pbudget.versionCode=${{ github.run_number }}
          -Pbudget.versionName=${{ steps.version.outputs.version }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.version.outputs.version }}
          name: Android ${{ steps.version.outputs.version }}
          files: mobile/androidApp/build/outputs/apk/release/androidApp-release.apk
          prerelease: true
          generate_release_notes: true
