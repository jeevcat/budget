name: Android

on:
  push:
    branches: [main]

# Only one build at a time — cancel in-flight builds when a new push arrives
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Get version
        id: version
        run: echo "version=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.version.outputs.version }}
          name: Android ${{ steps.version.outputs.version }}
          files: mobile/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          prerelease: true
          generate_release_notes: true
